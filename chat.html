<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat — Exoo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="chat.css">
</head>
<body class="chat-body">

<div class="noise"></div>
<div class="bg-glow chat-glow"></div>

<div class="chat-layout">

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-top">
      <a href="index.html" class="logo">exoo<span class="logo-dot">.</span></a>
      <button class="sidebar-close" id="sidebarClose" aria-label="Close sidebar">✕</button>
    </div>
    <button class="btn btn-primary full sidebar-new-btn" id="newChatBtn">
      <svg viewBox="0 0 24 24" fill="none" width="15" height="15"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      New chat
    </button>
    <div class="sidebar-list" id="sidebarList">
      <!-- conversation items injected by chat.js -->
    </div>
    <div class="sidebar-bottom">
      <span class="chat-user-email mono" id="userEmail"></span>
      <a href="settings.html" class="btn btn-ghost btn-sm full">Settings</a>
      <button class="btn btn-ghost btn-sm full" id="signOutBtn">Sign out</button>
    </div>
  </aside>

  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <!-- MAIN CHAT AREA -->
  <div class="chat-area">
    <header class="chat-header">
      <button class="sidebar-toggle" id="sidebarToggle" aria-label="Open sidebar">
        <svg viewBox="0 0 24 24" fill="none"><path d="M3 6h18M3 12h18M3 18h18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      </button>
      <span class="chat-current-title mono" id="chatCurrentTitle">New chat</span>
      <span class="status mono chat-status"><span class="status-dot"></span> online</span>
    </header>

    <main class="chat-main">
      <div class="chat-window" id="chatWindow">
        <div class="chat-empty" id="chatEmpty">
          <p class="eyebrow mono">⏤ ask exoo anything</p>
          <h1>What do you want to know?</h1>
          <p class="chat-empty-sub">Answers stream in instantly, with sources you can check.</p>
          <div class="chat-suggestions">
            <button class="chip" data-q="Explain quantum computing in simple terms">Explain quantum computing simply</button>
            <button class="chip" data-q="What's a good 5-step morning routine?">A good 5-step morning routine</button>
            <button class="chip" data-q="Summarize the causes of the French Revolution">Causes of the French Revolution</button>
          </div>
        </div>
      </div>

      <div class="chat-attachments" id="chatAttachments"></div>

      <form class="chat-input-bar" id="chatForm">
        <button type="button" class="chat-attach-btn" id="attachBtn" aria-label="Attach files">
          <svg viewBox="0 0 24 24" fill="none"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <input type="file" id="fileInput" accept="image/png,image/jpeg,image/webp,.pdf,.txt,.docx" multiple hidden />

        <input
          type="text"
          id="chatInput"
          class="chat-input"
          placeholder="Ask Exoo anything…"
          autocomplete="off"
          maxlength="2000"
        />

        <div class="model-select-wrap">
          <button type="button" class="model-select-btn mono" id="modelSelectBtn" aria-haspopup="listbox" aria-expanded="false">
            <span id="modelSelectLabel">Sonnet</span>
            <svg viewBox="0 0 24 24" fill="none" class="model-chevron"><path d="M6 9l6 6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
          <ul class="model-dropdown" id="modelDropdown" role="listbox">
            <li role="option" data-model="opus" class="model-option">
              <span class="model-name">Opus</span>
              <span class="model-desc">Most capable, slower</span>
            </li>
            <li role="option" data-model="sonnet" class="model-option selected" aria-selected="true">
              <span class="model-name">Sonnet</span>
              <span class="model-desc">Balanced, default</span>
            </li>
            <li role="option" data-model="haiku" class="model-option">
              <span class="model-name">Haiku</span>
              <span class="model-desc">Fastest, lightweight</span>
            </li>
          </ul>
        </div>

        <button type="submit" class="chat-send" id="chatSend" aria-label="Send message">
          <svg viewBox="0 0 24 24" fill="none"><path d="M5 12h13M13 6l6 6-6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </form>
      <p class="chat-disclaimer mono">Exoo can make mistakes. Check important info.</p>
    </main>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.108.2"></script>
<script src="supabase-config.js"></script>
<script src="chat.js"></script>
</body>
</html>
